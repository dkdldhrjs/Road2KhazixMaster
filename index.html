<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >
  <meta name="theme-color" content="#090c08">

  <title>Road2KhazixMaster</title>

  <style>
    :root {
      --bg: #080b07;
      --panel: #11170d;
      --panel2: #171f12;
      --line: #344128;
      --text: #f2f6ec;
      --muted: #a8b19f;
      --lime: #b9ff4f;
      --purple: #ae87ff;
      --danger: #ff7479;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(
          circle at 5% 0%,
          rgba(185, 255, 79, 0.11),
          transparent 28rem
        ),
        radial-gradient(
          circle at 100% 8%,
          rgba(174, 135, 255, 0.10),
          transparent 28rem
        ),
        var(--bg);

      font-family:
        Pretendard,
        "Noto Sans KR",
        system-ui,
        sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1080px, 100%);
      margin: auto;
      padding: 18px 14px 60px;
    }

    .hero {
      padding: 24px 19px;
      border: 1px solid rgba(185, 255, 79, 0.18);
      border-radius: 25px;

      background:
        linear-gradient(
          135deg,
          rgba(185, 255, 79, 0.08),
          rgba(174, 135, 255, 0.08)
        ),
        rgba(17, 23, 13, 0.95);

      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.34);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--lime);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    h1 {
      margin: 0;
      font-size: clamp(29px, 8vw, 48px);
      line-height: 1.05;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .api-state {
      display: inline-flex;
      align-items: center;
      gap: 8px;

      margin-top: 16px;
      padding: 8px 11px;

      border: 1px solid var(--line);
      border-radius: 999px;

      color: var(--muted);
      background: rgba(0, 0, 0, 0.18);
      font-size: 13px;
    }

    .api-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffc857;
    }

    .api-state.online .api-dot {
      background: var(--lime);
      box-shadow: 0 0 12px rgba(185, 255, 79, 0.6);
    }

    .api-state.error .api-dot {
      background: var(--danger);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 13px;
    }

    .summary-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: rgba(17, 23, 13, 0.94);
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
    }

    .summary-value {
      margin-top: 4px;
      font-size: 22px;
      font-weight: 950;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;

      margin: 14px 0;
      padding: 10px;

      border: 1px solid var(--line);
      border-radius: 18px;

      background: rgba(8, 11, 7, 0.9);
      backdrop-filter: blur(14px);
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 8px;
    }

    .search,
    .control {
      width: 100%;
      min-width: 0;
      padding: 13px;

      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 13px;
      outline: none;

      background: var(--panel);
    }

    .search:focus,
    .control:focus,
    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--lime);
      box-shadow: 0 0 0 3px rgba(185, 255, 79, 0.09);
    }

    .refresh {
      border: 1px solid var(--lime);
      border-radius: 13px;

      color: #11170d;
      background: var(--lime);

      font-size: 20px;
      font-weight: 900;
    }

    .refresh.loading {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .filters {
      display: flex;
      gap: 7px;
      margin-top: 8px;
      overflow-x: auto;
    }

    .filter {
      flex: 0 0 auto;
      padding: 8px 11px;

      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;

      background: transparent;
      font-size: 12px;
      font-weight: 800;
    }

    .filter.active {
      color: #10150b;
      border-color: var(--lime);
      background: var(--lime);
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
      margin: 19px 2px 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .section-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .champ-card {
      min-height: 155px;
      padding: 11px;

      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 17px;

      text-align: left;
      background:
        linear-gradient(
          145deg,
          var(--panel2),
          var(--panel)
        );
    }

    .champ-card.has-stats {
      border-color: rgba(174, 135, 255, 0.45);
    }

    .champ-card.saved {
      box-shadow: inset 0 0 0 1px rgba(185, 255, 79, 0.2);
    }

    .champ-top {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .champ-img,
    .fallback {
      width: 54px;
      height: 54px;
      flex: 0 0 54px;

      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 13px;

      object-fit: cover;
      background: #20291a;
    }

    .fallback {
      display: grid;
      place-items: center;
      color: var(--lime);
      font-weight: 950;
    }

    .champ-text {
      min-width: 0;
    }

    .champ-name {
      margin: 0 0 2px;
      font-size: 15px;
      font-weight: 950;
    }

    .champ-en {
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
    }

    .badge {
      padding: 4px 7px;
      border-radius: 999px;

      color: var(--muted);
      background: rgba(255, 255, 255, 0.06);

      font-size: 10px;
      font-weight: 850;
    }

    .badge.api {
      color: #d3bfff;
      background: rgba(174, 135, 255, 0.12);
    }

    .badge.saved {
      color: var(--lime);
      background: rgba(185, 255, 79, 0.10);
    }

    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 11px;
    }

    .mini {
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.16);
    }

    .mini-label {
      color: var(--muted);
      font-size: 10px;
    }

    .mini-value {
      margin-top: 2px;
      font-size: 14px;
      font-weight: 900;
    }

    .no-stats {
      margin-top: 12px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 35px 15px;

      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 17px;

      text-align: center;
    }

    dialog {
      width: min(650px, calc(100% - 20px));
      max-height: calc(100dvh - 20px);
      padding: 0;

      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 22px;

      background: var(--panel);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 3;

      display: flex;
      align-items: center;
      gap: 11px;

      padding: 13px;
      border-bottom: 1px solid var(--line);

      background: rgba(17, 23, 13, 0.97);
    }

    .modal-title {
      min-width: 0;
      flex: 1;
    }

    .modal-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .modal-title p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .close {
      width: 42px;
      height: 42px;

      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 11px;

      background: var(--panel2);
      font-size: 21px;
    }

    .modal-body {
      padding: 15px;
      overflow-y: auto;
    }

    .auto-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;

      padding: 11px;
      border: 1px solid rgba(174, 135, 255, 0.25);
      border-radius: 14px;

      background: rgba(174, 135, 255, 0.07);
    }

    .auto-stat {
      text-align: center;
    }

    .auto-stat span {
      display: block;
      color: var(--muted);
      font-size: 10px;
    }

    .auto-stat strong {
      display: block;
      margin-top: 3px;
      font-size: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-top: 13px;
    }

    .field label {
      font-size: 13px;
      font-weight: 850;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 12px;

      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;

      background: #0c1109;
    }

    .field textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.55;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 8px;

      margin-top: 16px;
    }

    .delete,
    .save {
      min-height: 45px;
      border-radius: 12px;
      font-weight: 900;
    }

    .delete {
      color: #fff;
      border: 1px solid rgba(255, 116, 121, 0.4);
      background: rgba(255, 116, 121, 0.15);
    }

    .save {
      color: #11170d;
      border: 1px solid var(--lime);
      background: var(--lime);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 23px;
      z-index: 100;

      max-width: calc(100% - 28px);
      padding: 11px 15px;

      color: var(--text);
      border: 1px solid rgba(185, 255, 79, 0.35);
      border-radius: 999px;

      background: rgba(17, 23, 13, 0.97);

      opacity: 0;
      pointer-events: none;
      text-align: center;

      transform: translate(-50%, 20px);
      transition: 0.2s;

      font-size: 13px;
      font-weight: 800;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (min-width: 700px) {
      .summary-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (min-width: 980px) {
      .grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">ROAD TO KHA'ZIX MASTER</p>

      <h1>카직스 상대법 도감</h1>

      <p class="subtitle">
        한국 서버 마스터 이상 카직스 정글 경기 통계를 자동으로 불러옵니다.
        난이도, 진화 순서와 템트리는 직접 저장할 수 있습니다.
      </p>

      <div id="apiState" class="api-state">
        <span class="api-dot"></span>
        <span>API 연결 확인 중</span>
      </div>
    </section>

    <section class="summary-grid">
      <article class="summary-card">
        <div class="summary-label">분석한 전체 경기</div>
        <div id="processedMatches" class="summary-value">-</div>
      </article>

      <article class="summary-card">
        <div class="summary-label">카직스 경기</div>
        <div id="khazixGames" class="summary-value">-</div>
      </article>

      <article class="summary-card">
        <div class="summary-label">카직스 승률</div>
        <div id="winRate" class="summary-value">-</div>
      </article>

      <article class="summary-card">
        <div class="summary-label">상대 챔피언</div>
        <div id="opponentCount" class="summary-value">-</div>
      </article>
    </section>

    <section class="toolbar">
      <div class="search-row">
        <input
          id="search"
          class="search"
          type="search"
          placeholder="상대 정글 검색"
          autocomplete="off"
        >

        <button
          id="refresh"
          class="refresh"
          type="button"
          title="통계 새로고침"
        >
          ↻
        </button>
      </div>

      <div class="controls">
        <select id="tier" class="control">
          <option value="ALL">마스터 이상 전체</option>
          <option value="CHALLENGER">챌린저</option>
          <option value="GRANDMASTER">그랜드마스터</option>
          <option value="MASTER">마스터</option>
        </select>

        <select id="sort" class="control">
          <option value="games">표본 많은 순</option>
          <option value="hard">어려운 순</option>
          <option value="easy">쉬운 순</option>
          <option value="name">이름순</option>
        </select>
      </div>

      <div class="filters">
        <button class="filter active" data-filter="all">
          전체
        </button>

        <button class="filter" data-filter="stats">
          자동 통계 있음
        </button>

        <button class="filter" data-filter="saved">
          내 공략 작성
        </button>

        <button class="filter" data-filter="hard">
          어려운 상대
        </button>
      </div>
    </section>

    <div class="section-title">
      <h2>상대 정글 목록</h2>
      <span id="resultCount">불러오는 중</span>
    </div>

    <section id="championGrid" class="grid"></section>
  </main>

  <dialog id="editor">
    <div class="modal-head">
      <div id="modalAvatar"></div>

      <div class="modal-title">
        <h2 id="modalName">챔피언</h2>
        <p id="modalEnglish">Champion</p>
      </div>

      <button id="closeEditor" class="close" type="button">
        ×
      </button>
    </div>

    <form id="guideForm" class="modal-body">
      <div class="auto-stats">
        <div class="auto-stat">
          <span>자동 난이도</span>
          <strong id="autoDifficulty">-</strong>
        </div>

        <div class="auto-stat">
          <span>카직스 승률</span>
          <strong id="modalWinRate">-</strong>
        </div>

        <div class="auto-stat">
          <span>표본</span>
          <strong id="modalGames">-</strong>
        </div>
      </div>

      <div class="field">
        <label for="difficulty">
          내가 평가한 난이도
        </label>

        <select id="difficulty">
          <option value="">자동 난이도 사용</option>
          <option value="매우 쉬움">매우 쉬움</option>
          <option value="쉬움">쉬움</option>
          <option value="보통">보통</option>
          <option value="어려움">어려움</option>
          <option value="매우 어려움">매우 어려움</option>
        </select>
      </div>

      <div class="field">
        <label for="evolution">
          추천 진화 순서
        </label>

        <input
          id="evolution"
          placeholder="예: Q → W → E"
        >
      </div>

      <div class="field">
        <label for="items">
          추천 템트리
        </label>

        <textarea
          id="items"
          placeholder="예: 요우무 → 밤의 끝자락 → 세릴다"
        ></textarea>
      </div>

      <div class="actions">
        <button
          id="deleteGuide"
          class="delete"
          type="button"
        >
          내 기록 삭제
        </button>

        <button class="save" type="submit">
          저장하기
        </button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast"></div>

        document.getElementById("modalWinRate"),

      modalGames:
        document.getElementById("modalGames"),

      difficulty:
        document.getElementById("difficulty"),

      evolution:
        document.getElementById("evolution"),

      items:
        document.getElementById("items"),

      guideForm:
        document.getElementById("guideForm"),

      toast:
        document.getElementById("toast")
    };

    function loadGuides() {
      try {
        return JSON.parse(
          localStorage.getItem(STORAGE_KEY)
        ) || {};
      } catch {
        return {};
      }
    }

    function saveGuides() {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(state.guides)
      );
    }

    function normalize(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9가-힣]/g, "");
    }

    function getGuide(champion) {
      return state.guides[champion.id] || {};
    }

    function hasGuide(champion) {
      const guide = getGuide(champion);

      return Boolean(
        guide.difficulty ||
        guide.evolution ||
        guide.items
      );
    }

    function getStats(champion) {
      return (
        state.stats.get(
          normalize(champion.id)
        ) || null
      );
    }

    function imageUrl(champion) {
      return (
        "https://ddragon.leagueoflegends.com/" +
        `cdn/${DDRAGON_VERSION}/img/champion/` +
        `${champion.id}.png`
      );
    }

    function avatarHTML(champion) {
      return `
        <img
          class="champ-img"
          src="${imageUrl(champion)}"
          alt="${champion.ko}"
          loading="lazy"
          onerror="
            this.outerHTML =
            '<div class=&quot;fallback&quot;>' +
            '${champion.ko.slice(0, 1)}' +
            '</div>'
          "
        >
      `;
    }

    function shownDifficulty(champion) {
      const guide = getGuide(champion);
      const stats = getStats(champion);

      return (
        guide.difficulty ||
        stats?.difficulty ||
        "미설정"
      );
    }

    function difficultyNumber(value) {
      const map = {
        "매우 어려움": 0,
        "어려움": 1,
        "보통": 2,
        "쉬움": 3,
        "매우 쉬움": 4,
        "표본 부족": 5,
        "미설정": 6
      };

      return map[value] ?? 6;
    }

    async function requestJSON(url) {
      const response = await fetch(
        url,
        {
          cache: "no-store"
        }
      );

      const data = await response
        .json()
        .catch(() => null);

      if (
        !response.ok ||
        !data?.ok
      ) {
        throw new Error(
          data?.error ||
          `요청 실패 ${response.status}`
        );
      }

      return data;
    }

    async function loadApi(showToastMessage = false) {
      if (state.loading) {
        return;
      }

      state.loading = true;

      elements.refresh.classList.add(
        "loading"
      );

      setApiState(
        "loading",
        "API 연결 중"
      );

      const selectedTier =
        elements.tier.value;

      const statsUrl =
        selectedTier === "ALL"
          ? `${API_BASE}/stats`
          : `${API_BASE}/stats?tier=${selectedTier}`;

      try {
        const [
          statusData,
          statsData
        ] = await Promise.all([
          requestJSON(
            `${API_BASE}/status`
          ),

          requestJSON(statsUrl)
        ]);

        state.statusData =
          statusData;

        state.statsData =
          statsData;

        state.stats.clear();

        for (
          const row of
          statsData.matchups || []
        ) {
          state.stats.set(
            normalize(row.opponent),
            {
              opponent:
                row.opponent,

              games:
                Number(row.games || 0),

              wins:
                Number(row.wins || 0),

              losses:
                Number(row.losses || 0),

              winRate:
                Number(
                  row.winRate || 0
                ),

              difficulty:
                row.difficulty ||
                "표본 부족"
            }
          );
        }

        updateSummary();

        setApiState(
          "online",
          "천상계 통계 연결됨"
        );

        if (showToastMessage) {
          showToast(
            "최신 통계를 불러왔습니다."
          );
        }
      } catch (error) {
        console.error(error);

        setApiState(
          "error",
          "API 연결 실패"
        );

        showToast(
          `통계 오류: ${error.message}`
        );
      } finally {
        state.loading = false;

        elements.refresh.classList.remove(
          "loading"
        );

        render();
      }
    }

    function setApiState(type, text) {
      elements.apiState.classList.remove(
        "online",
        "error"
      );

      if (type === "online") {
        elements.apiState.classList.add(
          "online"
        );
      }

      if (type === "error") {
        elements.apiState.classList.add(
          "error"
        );
      }

      elements.apiState
        .querySelector("span:last-child")
        .textContent = text;
    }

    function updateSummary() {
      const status =
        state.statusData || {};

      const summary =
        state.statsData?.summary || {};

      elements.processedMatches.textContent =
        Number(
          status.processedMatches || 0
        ).toLocaleString("ko-KR");

      elements.khazixGames.textContent =
        Number(
          status.khazixGames ||
          summary.games ||
          0
        ).toLocaleString("ko-KR");

      elements.winRate.textContent =
        `${Number(
          summary.winRate ||
          status.winRate ||
          0
        ).toFixed(1)}%`;

      elements.opponentCount.textContent =
        Number(
          summary.opponents ||
          state.stats.size
        ).toLocaleString("ko-KR");
    }

    function getVisibleChampions() {
      const query =
        normalize(state.query);

      const visible =
        champions.filter(champion => {
          const stats =
            getStats(champion);

          const difficulty =
            shownDifficulty(champion);

          const matches =
            !query ||
            normalize(champion.ko)
              .includes(query) ||
            normalize(champion.en)
              .includes(query);

          if (!matches) {
            return false;
          }

          if (
            state.filter === "stats"
          ) {
            return Boolean(stats);
          }

          if (
            state.filter === "saved"
          ) {
            return hasGuide(champion);
          }

          if (
            state.filter === "hard"
          ) {
            return [
              "어려움",
              "매우 어려움"
            ].includes(difficulty);
          }

          return true;
        });

      const sort =
        elements.sort.value;

      visible.sort((a, b) => {
        const aStats =
          getStats(a);

        const bStats =
          getStats(b);

        if (sort === "games") {
          return (
            Number(
              bStats?.games || 0
            ) -
            Number(
              aStats?.games || 0
            ) ||
            a.ko.localeCompare(
              b.ko,
              "ko"
            )
          );
        }

        if (sort === "hard") {
          return (
            difficultyNumber(
              shownDifficulty(a)
            ) -
            difficultyNumber(
              shownDifficulty(b)
            )
          );
        }

        if (sort === "easy") {
          return (
            difficultyNumber(
              shownDifficulty(b)
            ) -
            difficultyNumber(
              shownDifficulty(a)
            )
          );
        }

        return a.ko.localeCompare(
          b.ko,
          "ko"
        );
      });

      return visible;
    }

    function render() {
      const visible =
        getVisibleChampions();

      elements.resultCount.textContent =
        `${visible.length}명 표시 중`;

      elements.grid.innerHTML = "";

      if (!visible.length) {
        elements.grid.innerHTML = `
          <div class="empty">
            조건에 맞는 챔피언이 없습니다.
          </div>
        `;

        return;
      }

      const fragment =
        document.createDocumentFragment();

      for (const champion of visible) {
        const stats =
          getStats(champion);

        const saved =
          hasGuide(champion);

        const difficulty =
          shownDifficulty(champion);

        const card =
          document.createElement(
            "button"
          );

        card.type = "button";

        card.className =
          `champ-card ` +
          `${stats ? "has-stats " : ""}` +
          `${saved ? "saved" : ""}`;

        card.innerHTML = `
          <div class="champ-top">
            ${avatarHTML(champion)}

            <div class="champ-text">
              <p class="champ-name">
                ${champion.ko}
              </p>

              <div class="champ-en">
                ${champion.en}
              </div>

              <div class="badges">
                <span
                  class="badge ${
                    stats ? "api" : ""
                  }"
                >
                  ${difficulty}
                </span>

                ${
                  saved
                    ? `
                      <span class="badge saved">
                        내 공략 저장됨
                      </span>
                    `
                    : ""
                }
              </div>
            </div>
          </div>

          ${
            stats
              ? `
                <div class="card-stats">
                  <div class="mini">
                    <div class="mini-label">
                      카직스 승률
                    </div>

                    <div class="mini-value">
                      ${stats.winRate.toFixed(1)}%
                    </div>
                  </div>

                  <div class="mini">
                    <div class="mini-label">
                      표본
                    </div>

                    <div class="mini-value">
                      ${stats.games.toLocaleString(
                        "ko-KR"
                      )}판
                    </div>
                  </div>
                </div>
              `
              : `
                <div class="no-stats">
                  아직 자동 통계가 없습니다.<br>
                  수집이 진행되면 표시됩니다.
                </div>
              `
          }
        `;

        card.addEventListener(
          "click",
          () => openEditor(champion)
        );

        fragment.appendChild(card);
      }

      elements.grid.appendChild(
        fragment
      );
    }

    function openEditor(champion) {
      state.currentChampion =
        champion;

      const stats =
        getStats(champion);

      const guide =
        getGuide(champion);

      elements.modalAvatar.innerHTML =
        avatarHTML(champion);

      elements.modalName.textContent =
        champion.ko;

      elements.modalEnglish.textContent =
        champion.en;

      elements.autoDifficulty.textContent =
        stats?.difficulty ||
        "통계 없음";

      elements.modalWinRate.textContent =
        stats
          ? `${stats.winRate.toFixed(1)}%`
          : "-";

      elements.modalGames.textContent =
        stats
          ? `${stats.games.toLocaleString(
              "ko-KR"
            )}판`
          : "-";

      elements.difficulty.value =
        guide.difficulty || "";

      elements.evolution.value =
        guide.evolution || "";

      elements.items.value =
        guide.items || "";

      elements.editor.showModal();

      document.body.style.overflow =
        "hidden";
    }

    function closeEditor() {
      elements.editor.close();

      document.body.style.overflow =
        "";
    }

    elements.guideForm.addEventListener(
      "submit",
      event => {
        event.preventDefault();

        const champion =
          state.currentChampion;

        if (!champion) {
          return;
        }

        state.guides[champion.id] = {
          difficulty:
            elements.difficulty.value,

          evolution:
            elements.evolution.value
              .trim(),

          items:
            elements.items.value
              .trim()
        };

        saveGuides();
        render();
        closeEditor();

        showToast(
          `${champion.ko} 공략을 저장했습니다.`
        );
      }
    );

    document
      .getElementById("deleteGuide")
      .addEventListener(
        "click",
        () => {
          const champion =
            state.currentChampion;

          if (!champion) {
            return;
          }

          if (
            !state.guides[
              champion.id
            ]
          ) {
            showToast(
              "삭제할 내 기록이 없습니다."
            );

            return;
          }

          if (
            !confirm(
              `${champion.ko} 기록을 삭제할까요?`
            )
          ) {
            return;
          }

          delete state.guides[
            champion.id
          ];

          saveGuides();
          render();
          closeEditor();

          showToast(
            "내 기록을 삭제했습니다."
          );
        }
      );

    elements.search.addEventListener(
      "input",
      event => {
        state.query =
          event.target.value;

        render();
      }
    );

    elements.tier.addEventListener(
      "change",
      () => loadApi()
    );

    elements.sort.addEventListener(
      "change",
      render
    );

    elements.refresh.addEventListener(
      "click",
      () => loadApi(true)
    );

    document
      .querySelectorAll(".filter")
      .forEach(button => {
        button.addEventListener(
          "click",
          () => {
            document
              .querySelectorAll(
                ".filter"
              )
              .forEach(item => {
                item.classList.remove(
                  "active"
                );
              });

            button.classList.add(
              "active"
            );

            state.filter =
              button.dataset.filter;

            render();
          }
        );
      });

    document
      .getElementById("closeEditor")
      .addEventListener(
        "click",
        closeEditor
      );

    elements.editor.addEventListener(
      "click",
      event => {
        const box =
          elements.editor
            .getBoundingClientRect();

        const outside =
          event.clientX < box.left ||
          event.clientX > box.right ||
          event.clientY < box.top ||
          event.clientY > box.bottom;

        if (outside) {
          closeEditor();
        }
      }
    );

    let toastTimer;

    function showToast(message) {
      clearTimeout(toastTimer);

      elements.toast.textContent =
        message;

      elements.toast.classList.add(
        "show"
      );

      toastTimer = setTimeout(
        () => {
          elements.toast.classList.remove(
            "show"
          );
        },
        1900
      );
    }

    render();
    loadApi();
  </script>
</body>
</html>
